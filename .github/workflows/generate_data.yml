name: Spacecraft Data Ingestion

on:
  push:
    branches:
      - main
    paths:
      - 'src/data_ingestion.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-v2-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Data Ingestion & EDA Plotting
      run: |
        python src/data_ingestion.py

    - name: Commit and push raw data artifacts
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        if [ -d data/raw ]; then
          git add data/raw/
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes detected in ingestion artifacts."
          else
            git commit -m "DataOps: Ingested fresh telemetry and updated EDA plots in data/raw"
            git pull --rebase origin main
            git push
          fi
        fi
