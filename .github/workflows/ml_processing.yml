name: Spacecraft ML Processing

on:
  workflow_run:
    workflows: ["Spacecraft Data Ingestion"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-evaluate:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-v2-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run ML Anomaly Detection Model
      run: |
        python src/anomaly_detection.py

    - name: Commit and push ML artifacts
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Fetch latest changes and align HEAD without touching our generated files
        git fetch origin main
        git reset origin/main
        
        if [ -d data/processed ]; then
          git add data/processed/
          
          if git diff --cached --quiet; then
            echo "No changes detected in ML artifacts."
          else
            git commit -m "MLOps: Executed Isolation Forest and updated data/processed artifacts"
            git push origin main
          fi
        fi
