name: Spacecraft Report Generation

on:
  workflow_run:
    workflows: ["Spacecraft ML Processing"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-v2-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # This step securely injects your Gemini API Key from GitHub Secrets into the runner environment
    - name: Run GenAI Multi-Agent Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python src/report_generation.py

    - name: Commit and push generated report
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        if [ -d data/results ]; then
          git add data/results/
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes detected in generation artifacts."
          else
            git commit -m "GenAI: Generated emergency operations brief from ML digest"
            git pull --rebase origin main
            git push
          fi
        fi
